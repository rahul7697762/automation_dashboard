  <!-- ── Native Splash (renders before React JS loads) ─────────────────── -->
  <style>
    #native-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #070707;
      overflow: hidden;
      animation: ns-in 0.4s ease-out both;
    }
    #native-splash.ns-exit {
      animation: ns-out 0.8s ease-in forwards;
    }
    @keyframes ns-in  { from{opacity:0} to{opacity:1} }
    @keyframes ns-out { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.04)} }

    /* grid */
    #native-splash::before {
      content:'';
      position:absolute;inset:0;
      background-image:
        linear-gradient(rgba(38,206,206,.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(38,206,206,.04) 1px,transparent 1px);
      background-size:48px 48px;
      animation:ns-grid 6s linear infinite;
    }
    @keyframes ns-grid { from{background-position:0 0} to{background-position:48px 48px} }

    /* rings */
    .ns-ring {
      position:absolute;border-radius:50%;border-style:solid;
      border-color:rgba(38,206,206,.08);pointer-events:none;
    }
    .ns-r1{width:480px;height:480px;border-width:1px;animation:ns-ring 4s ease-in-out infinite}
    .ns-r2{width:680px;height:680px;border-width:1px;border-color:rgba(38,206,206,.05);animation:ns-ring 4s ease-in-out infinite .8s}
    .ns-r3{width:880px;height:880px;border-width:1px;border-color:rgba(38,206,206,.03);animation:ns-ring 4s ease-in-out infinite 1.6s}
    @keyframes ns-ring { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.03);opacity:.5} }

    /* orbs */
    .ns-orb1{position:absolute;top:-180px;left:-180px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(38,206,206,.12) 0%,transparent 70%);animation:ns-orb 8s ease-in-out infinite}
    .ns-orb2{position:absolute;bottom:-180px;right:-180px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(38,206,206,.10) 0%,transparent 70%);animation:ns-orb 8s ease-in-out infinite 4s}
    @keyframes ns-orb { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(20px,-20px) scale(1.05)} }

    /* content */
    #ns-content {
      position:relative;z-index:1;
      display:flex;flex-direction:column;align-items:center;
      gap:18px;text-align:center;
    }
    .ns-ornament {
      display:flex;align-items:center;gap:12px;
      animation:ns-sd .6s ease-out .2s both;
    }
    .ns-ornament-b { animation:ns-su .6s ease-out 1.8s both; display:flex;align-items:center;gap:12px; }
    .ns-line { display:block;width:48px;height:1px;background:linear-gradient(90deg,transparent,rgba(38,206,206,.5),transparent); }
    .ns-diamond { font-size:12px;color:#26CECE;animation:ns-spin 6s linear infinite;display:inline-block; }
    @keyframes ns-spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .ns-welcome {
      font-family:'Space Grotesk','Inter',system-ui,sans-serif;
      font-size:12px;font-weight:400;letter-spacing:.35em;text-transform:uppercase;
      color:rgba(38,206,206,.6);animation:ns-sd .6s ease-out .3s both;
    }
    .ns-brand {
      display:flex;gap:2px;position:relative;
      font-family:'Space Grotesk','Inter',system-ui,sans-serif;
      font-size:clamp(48px,10vw,80px);font-weight:800;letter-spacing:.12em;
      text-transform:uppercase;color:#F0F0F0;
    }
    .ns-brand::after {
      content:'';position:absolute;inset:-5px -20px;
      background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(38,206,206,.12) 0%,transparent 100%);
      pointer-events:none;filter:blur(8px);
    }
    .ns-letter {
      display:inline-block;opacity:0;transform:translateY(30px);
      animation:ns-lr .5s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes ns-lr { from{opacity:0;transform:translateY(30px);filter:blur(8px)} to{opacity:1;transform:translateY(0);filter:blur(0)} }

    .ns-sub {
      font-family:'Space Grotesk','Inter',system-ui,sans-serif;
      font-size:clamp(11px,2vw,13px);font-weight:400;letter-spacing:.55em;text-transform:uppercase;
      color:rgba(38,206,206,.5);animation:ns-su .6s ease-out 1.2s both;padding-right:.55em;
    }
    .ns-tagline {
      font-family:'Space Grotesk','Inter',system-ui,sans-serif;
      font-size:11px;font-weight:300;letter-spacing:.18em;text-transform:uppercase;
      color:rgba(240,240,240,.35);white-space:nowrap;
    }
    .ns-bar {
      width:180px;height:2px;background:rgba(38,206,206,.12);
      border-radius:99px;overflow:hidden;margin-top:8px;
      animation:ns-su .6s ease-out 2.0s both;
    }
    .ns-progress {
      height:100%;width:0%;
      background:linear-gradient(90deg,transparent,#26CECE,#35DFDF);
      border-radius:99px;box-shadow:0 0 8px rgba(38,206,206,.8);
      animation:ns-fill 3.5s cubic-bezier(.4,0,.2,1) .4s forwards;
    }
    @keyframes ns-fill { 0%{width:0%} 60%{width:75%} 85%{width:88%} 100%{width:100%} }
    @keyframes ns-sd { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes ns-su { from{opacity:0;transform:translateY(12px)}  to{opacity:1;transform:translateY(0)} }
  </style>



  <div id="native-splash">

      </div>
      <div class="ns-bar"><div class="ns-progress"></div></div>
    </div>
  </div>
  <!-- ── End Native Splash ──────────────────────────────────────────────── -->

  <script>
    // Runs AFTER the div exists in the DOM
    (function() {
      var SKIP = ['/home', '/dashboard', '/admin', '/settings', '/agents'];
      var path = window.location.pathname.toLowerCase();
      var isInternal = SKIP.some(function(p){ return path.startsWith(p); });
      var el = document.getElementById('native-splash');

      if (!el) return;

      // Instantly hide on internal routes or repeat visits
      if (isInternal || sessionStorage.getItem('bitlance_splash_seen')) {
        el.style.display = 'none';
        window.__splashDone = true;
        return;
      }

      // First visit on a public route — start dismiss timers
      window.__splashDone = false;
      setTimeout(function(){ el.classList.add('ns-exit'); }, 3800);
      setTimeout(function(){
        el.style.display = 'none';
        sessionStorage.setItem('bitlance_splash_seen', 'true');
        window.__splashDone = true;
      }, 4600);
    })();
  </script>
