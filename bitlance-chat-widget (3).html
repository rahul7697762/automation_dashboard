<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bitlance TechHub – Chat Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand:       #5B4FE8;
    --brand-dark:  #3D31CC;
    --brand-glow:  rgba(91,79,232,0.35);
    --accent:      #00E5A0;
    --bg:          #0C0B14;
    --surface:     #141220;
    --surface2:    #1D1A2F;
    --border:      rgba(255,255,255,0.07);
    --text:        #F0EEF8;
    --muted:       #7B78A0;
    --radius:      18px;
    --widget-w:    390px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .demo-page {
    text-align: center;
    padding: 40px 20px;
    position: relative;
  }
  .demo-page::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(91,79,232,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(0,229,160,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .demo-page h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 30%, var(--brand) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 14px;
  }
  .demo-page p { color: var(--muted); font-size: 1.05rem; max-width: 420px; margin: 0 auto 32px; line-height: 1.7; }
  .demo-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(91,79,232,0.15); border: 1px solid rgba(91,79,232,0.3);
    color: #a89fff; font-size: 0.78rem; font-weight: 500;
    padding: 6px 14px; border-radius: 999px; margin-bottom: 28px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .demo-badge span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; animation: pulse 1.8s infinite; }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }

  /* ── BUBBLE ── */
  #chat-bubble {
    position: fixed; bottom: 28px; right: 28px;
    width: 62px; height: 62px; border-radius: 50%;
    background: linear-gradient(135deg, var(--brand), var(--brand-dark));
    box-shadow: 0 8px 32px var(--brand-glow), 0 2px 8px rgba(0,0,0,0.4);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    z-index: 9999; border: none;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: bubbleIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  #chat-bubble:hover { transform: scale(1.1); box-shadow: 0 12px 40px var(--brand-glow); }
  #chat-bubble svg { transition: transform 0.3s, opacity 0.3s; }
  #chat-bubble.open .icon-chat { opacity: 0; transform: scale(0.5) rotate(90deg); }
  #chat-bubble.open .icon-close { opacity: 1; transform: scale(1) rotate(0deg); }
  #chat-bubble .icon-close { position: absolute; opacity: 0; transform: scale(0.5) rotate(-90deg); }
  .notif-dot { position: absolute; top: 4px; right: 4px; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; border: 2px solid var(--bg); animation: pulse 1.8s infinite; }
  @keyframes bubbleIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

  /* ── WIDGET ── */
  #chat-widget {
    position: fixed; bottom: 104px; right: 28px;
    width: var(--widget-w); max-height: 640px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(91,79,232,0.1);
    display: flex; flex-direction: column; z-index: 9998; overflow: hidden;
    transform: translateY(20px) scale(0.95); opacity: 0; pointer-events: none;
    transition: transform 0.35s cubic-bezier(0.34,1.3,0.64,1), opacity 0.25s ease;
  }
  #chat-widget.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }

  /* Header */
  .widget-header {
    background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand) 100%);
    padding: 16px 18px; display: flex; align-items: center; gap: 12px;
    flex-shrink: 0; position: relative; overflow: hidden;
  }
  .widget-header::after { content:''; position:absolute; right:-20px; top:-20px; width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,0.06); }
  .header-avatar { width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;border:2px solid rgba(255,255,255,0.2); }
  .header-info { flex:1; }
  .header-info strong { font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;display:block;color:#fff; }
  .header-info span { font-size:0.72rem;color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:5px; }
  .online-dot { width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite; }

  /* Progress */
  .progress-bar { height:3px;background:rgba(255,255,255,0.1);flex-shrink:0; }
  .progress-fill { height:100%;background:linear-gradient(90deg,var(--accent),#00c87a);width:0%;transition:width 0.6s ease; }

  /* Messages */
  .widget-messages { flex:1;overflow-y:auto;padding:18px 16px 10px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent; }
  .widget-messages::-webkit-scrollbar { width:4px; }
  .widget-messages::-webkit-scrollbar-thumb { background:var(--surface2);border-radius:4px; }

  .msg { display:flex;gap:8px;align-items:flex-end;animation:msgIn 0.35s cubic-bezier(0.34,1.3,0.64,1) both; }
  @keyframes msgIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .msg.bot { flex-direction:row; }
  .msg.user { flex-direction:row-reverse; }
  .msg-avatar { width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand-dark));display:flex;align-items:center;justify-content:center;font-size:0.75rem;flex-shrink:0; }
  .msg-bubble { max-width:82%;padding:10px 14px;border-radius:16px;font-size:0.875rem;line-height:1.55; }
  .msg.bot .msg-bubble { background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text); }
  .msg.user .msg-bubble { background:linear-gradient(135deg,var(--brand),var(--brand-dark));border-bottom-right-radius:4px;color:#fff; }
  .msg-bubble strong { font-weight:600; }

  /* Typing */
  .typing-bubble { display:flex;gap:8px;align-items:flex-end; }
  .typing-dots { background:var(--surface2);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;padding:12px 16px;display:flex;gap:5px;align-items:center; }
  .typing-dots span { width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite; }
  .typing-dots span:nth-child(2){animation-delay:0.15s}
  .typing-dots span:nth-child(3){animation-delay:0.3s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* ── MULTI-SELECT BUTTONS ── */
  .multi-select-wrap { display:flex;flex-direction:column;gap:6px;animation:msgIn 0.4s 0.1s cubic-bezier(0.34,1.3,0.64,1) both; }

  .btn-option {
    background: transparent;
    border: 1px solid rgba(91,79,232,0.35);
    color: #c4c0f0;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    padding: 9px 14px;
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.12s;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    position: relative;
  }
  .btn-option:hover { background:rgba(91,79,232,0.15);border-color:var(--brand);color:#fff; }

  /* Single-select style */
  .btn-option.single:hover { transform: translateX(3px); }
  .btn-option.single:active { transform:scale(0.97); }
  .btn-option.single.selected { background:rgba(91,79,232,0.25);border-color:var(--brand);color:#fff;pointer-events:none; }

  /* Multi-select style — checkbox feel */
  .btn-option.multi { padding-right: 40px; }
  .btn-option.multi::after {
    content: '';
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px;
    border: 2px solid rgba(91,79,232,0.5);
    border-radius: 5px;
    background: transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-option.multi.checked { background:rgba(91,79,232,0.2);border-color:var(--brand);color:#fff; }
  .btn-option.multi.checked::after { background:var(--brand);border-color:var(--brand);background-image:url("data:image/svg+xml,%3Csvg width='12' height='9' viewBox='0 0 12 9' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4L4.5 7.5L11 1' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:center; }

  /* Confirm button */
  .confirm-btn {
    margin-top: 4px;
    background: linear-gradient(135deg, var(--brand), var(--brand-dark));
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 11px 18px;
    border: none; border-radius: 10px;
    cursor: pointer; width: 100%;
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.02em;
    opacity: 0.4;
    pointer-events: none;
  }
  .confirm-btn.active { opacity: 1; pointer-events: all; }
  .confirm-btn.active:hover { transform: translateY(-1px); opacity: 0.9; }

  /* Contact form */
  .contact-form { background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:9px;animation:msgIn 0.4s cubic-bezier(0.34,1.3,0.64,1) both; }
  .contact-form input { background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;padding:9px 12px;border-radius:9px;outline:none;transition:border-color 0.2s;width:100%; }
  .contact-form input:focus { border-color:var(--brand); }
  .contact-form input::placeholder { color:var(--muted); }
  .contact-form button { background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;padding:10px;border:none;border-radius:9px;cursor:pointer;transition:opacity 0.2s,transform 0.15s;letter-spacing:0.02em; }
  .contact-form button:hover { opacity:0.9;transform:translateY(-1px); }

  /* Calendly CTA */
  .calendly-cta { background:linear-gradient(135deg,rgba(0,229,160,0.1),rgba(91,79,232,0.15));border:1px solid rgba(0,229,160,0.3);border-radius:14px;padding:16px;text-align:center;animation:msgIn 0.4s cubic-bezier(0.34,1.3,0.64,1) both; }
  .calendly-cta p { font-size:0.82rem;color:var(--muted);margin-bottom:11px;line-height:1.5; }
  .calendly-cta a { display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--accent),#00c87a);color:#0C0B14;font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;padding:11px 22px;border-radius:999px;text-decoration:none;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 20px rgba(0,229,160,0.3);letter-spacing:0.02em; }
  .calendly-cta a:hover { transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,229,160,0.4); }

  /* ── Calendly open button ── */
  .cal-open-btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: linear-gradient(135deg, var(--accent), #00c87a);
    color: #0C0B14; font-family: 'Syne', sans-serif;
    font-size: 0.85rem; font-weight: 700;
    padding: 11px 22px; border-radius: 999px; border: none;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,229,160,0.3); letter-spacing: 0.02em;
  }
  .cal-open-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,229,160,0.4); }
  .cal-spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.3); border-top-color: #0C0B14;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle;
  }

  /* ── Calendly overlay inside widget ── */
  #cal-overlay {
    position: absolute; inset: 0; z-index: 100;
    background: var(--surface);
    display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    border-radius: var(--radius);
    overflow: hidden;
  }
  #cal-overlay.visible { transform: translateY(0); }
  .cal-overlay-header {
    background: linear-gradient(135deg, var(--brand-dark), var(--brand));
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .cal-overlay-header span { font-family:'Syne',sans-serif; font-size:0.9rem; font-weight:700; color:#fff; }
  .cal-overlay-header button {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    font-size: 0.8rem; font-weight: 600; padding: 5px 12px;
    border-radius: 999px; cursor: pointer;
    transition: background 0.15s; font-family:'DM Sans',sans-serif;
  }
  .cal-overlay-header button:hover { background: rgba(255,255,255,0.25); }
  .cal-loading {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    color: var(--muted); font-size: 0.85rem; position: absolute;
    inset: 56px 0 0 0; pointer-events: none;
  }
  .cal-loading-spinner {
    width: 32px; height: 32px; border-radius: 50%;
    border: 3px solid var(--border);
    border-top-color: var(--brand);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #calendly-iframe { flex: 1; width: 100%; border: none; background: #fff; min-height: 0; }

  /* ── Booking confirmed card ── */
  .booking-confirmed-card {
    background: linear-gradient(135deg, rgba(0,229,160,0.12), rgba(91,79,232,0.18));
    border: 1px solid rgba(0,229,160,0.35);
    border-radius: 16px; padding: 22px 18px;
    text-align: center; animation: msgIn 0.5s cubic-bezier(0.34,1.4,0.64,1) both;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .bc-icon { font-size: 2.2rem; animation: popIn 0.5s cubic-bezier(0.34,1.6,0.64,1) both; }
  @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
  .bc-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--accent); }
  .bc-subtitle { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
  .bc-subtitle strong { color: var(--text); }
  .bc-btn-outline {
    margin-top: 6px; display: inline-block;
    border: 1px solid rgba(91,79,232,0.5); color: #a89fff;
    font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 600;
    padding: 8px 18px; border-radius: 999px; text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }
  .bc-btn-outline:hover { background: rgba(91,79,232,0.2); color: #fff; }

  /* ── Confetti dots ── */
  .confetti-dot {
    position: absolute; top: 30%; border-radius: 2px;
    pointer-events: none; z-index: 99999;
    animation: confettiFall linear both;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(180px) rotate(360deg); opacity: 0; }
  }

  /* Footer */
  .widget-footer { padding:12px 14px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:center;gap:8px; }
  .footer-input { flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:9px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s; }
  .footer-input:focus { border-color:var(--brand); }
  .footer-input::placeholder { color:var(--muted); }
  .footer-send { width:38px;height:38px;border-radius:50%;background:var(--brand);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s,transform 0.15s;flex-shrink:0; }
  .footer-send:hover { background:var(--brand-dark);transform:scale(1.05); }
  .powered-by { text-align:center;font-size:0.68rem;color:var(--muted);padding:5px 0 8px;opacity:0.6;letter-spacing:0.03em; }

  @media (max-width: 440px) {
    :root { --widget-w: calc(100vw - 24px); }
    #chat-widget { right:12px;bottom:96px; }
    #chat-bubble { right:16px;bottom:20px; }
  }
</style>
</head>
<body>

<div class="demo-page">
  <div style="position:relative;z-index:1">
    <div class="demo-badge"><span></span> Live Widget Demo</div>
    <h1>Bitlance TechHub</h1>
    <p>AI Voice Bots & Business Automation. Click the chat button in the bottom-right to try the lead qualifier.</p>
  </div>
</div>

<!-- CHAT BUBBLE -->
<button id="chat-bubble" onclick="toggleWidget()" aria-label="Open chat">
  <div class="notif-dot"></div>
  <svg class="icon-chat" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  <svg class="icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
</button>

<!-- CHAT WIDGET -->
<div id="chat-widget">
  <div class="widget-header">
    <div class="header-avatar">🤖</div>
    <div class="header-info">
      <strong>Bitlance TechHub</strong>
      <span><span class="online-dot"></span> AI Assistant · Replies instantly</span>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="widget-messages" id="messages"></div>
  <div class="widget-footer">
    <input class="footer-input" id="footer-input" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendText()"/>
    <button class="footer-send" onclick="sendText()" aria-label="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="powered-by">Powered by Bitlance TechHub · AI Lead Qualifier</div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────
const WEBHOOK_URL  = 'https://bitlancetechhub.app.n8n.cloud/webhook/lead-chatbot';
const CALENDLY_URL = 'https://calendly.com/YOUR_CALENDLY_LINK'; // ← Replace
const SESSION_ID   = 'session_' + Math.random().toString(36).substr(2, 9);

// ── STATE ────────────────────────────────────────────────────────────────
let isOpen = false, hasOpened = false;
let currentStep = 'welcome';
let selectedServices = [];   // multi-select array
let sessionData = {};
let contactInfo = { name: '', email: '', phone: '' };

const progressMap = { welcome:5, service:22, role:44, budget:66, timeline:85, contact:95, booked:100, end:100 };

// ── TOGGLE ───────────────────────────────────────────────────────────────
function toggleWidget() {
  isOpen = !isOpen;
  document.getElementById('chat-widget').classList.toggle('open', isOpen);
  document.getElementById('chat-bubble').classList.toggle('open', isOpen);
  if (isOpen && !hasOpened) {
    hasOpened = true;
    const dot = document.querySelector('.notif-dot');
    if (dot) { dot.style.animation='none'; setTimeout(()=>dot.remove(),300); }
    setTimeout(() => startConversation(), 400);
  }
}

// ── HELPERS ──────────────────────────────────────────────────────────────
function setProgress(step) {
  document.getElementById('progress-fill').style.width = (progressMap[step]||0) + '%';
}
function scrollToBottom() {
  const el = document.getElementById('messages');
  setTimeout(() => el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' }), 80);
}
function fmt(text) {
  return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g,'<br/>');
}

// ── ADD MESSAGES ─────────────────────────────────────────────────────────
function addBotMessage(text, delay=0) {
  return new Promise(resolve => setTimeout(() => {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-bubble">${fmt(text)}</div>`;
    msgs.appendChild(div); scrollToBottom(); resolve();
  }, delay));
}
function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="msg-bubble">${text}</div>`;
  msgs.appendChild(div); scrollToBottom();
}
function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'typing-bubble'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div); scrollToBottom();
}
function removeTyping() { const t=document.getElementById('typing-indicator'); if(t) t.remove(); }

// ── RENDER BUTTONS ───────────────────────────────────────────────────────
function addButtons(buttons, isMulti = false, confirmLabel = '✅ Continue') {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'multi-select-wrap';
  wrap.id = 'btn-options';

  if (isMulti) {
    // Multi-select: checkboxes + confirm button
    buttons.forEach(btn => {
      const b = document.createElement('button');
      b.className = 'btn-option multi';
      b.textContent = btn.label;
      b.dataset.value = btn.value;
      b.dataset.step = btn.step;
      b.onclick = () => toggleMultiSelect(b, btn, confirmBtn);
      wrap.appendChild(b);
    });

    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'confirm-btn';
    confirmBtn.textContent = confirmLabel;
    confirmBtn.onclick = () => submitMultiSelect(buttons[0].step, wrap, confirmBtn);
    wrap.appendChild(confirmBtn);
  } else {
    // Single-select: normal buttons
    buttons.forEach(btn => {
      const b = document.createElement('button');
      b.className = 'btn-option single';
      b.textContent = btn.label;
      b.onclick = () => handleSingleClick(btn, wrap);
      wrap.appendChild(b);
    });
  }

  msgs.appendChild(wrap); scrollToBottom();
}

function toggleMultiSelect(btn, data, confirmBtn) {
  const val = btn.dataset.value;
  if (btn.classList.contains('checked')) {
    btn.classList.remove('checked');
    selectedServices = selectedServices.filter(s => s !== val);
  } else {
    btn.classList.add('checked');
    selectedServices.push(val);
  }
  // Enable confirm button only when at least 1 selected
  if (selectedServices.length > 0) {
    confirmBtn.classList.add('active');
    confirmBtn.textContent = `✅ Continue with ${selectedServices.length} selected`;
  } else {
    confirmBtn.classList.remove('active');
    confirmBtn.textContent = '✅ Continue';
  }
}

function submitMultiSelect(nextStep, wrap, confirmBtn) {
  if (selectedServices.length === 0) return;

  // Disable all
  wrap.querySelectorAll('.btn-option').forEach(b => b.style.pointerEvents='none');
  confirmBtn.style.pointerEvents = 'none';
  confirmBtn.textContent = '✓ Submitted';

  // Show user summary
  const serviceLabels = {
    ai_voice_bot:'🎙️ AI Voice Bot', ai_chatbot:'🤖 AI Chatbot', workflow_automation:'⚙️ Workflow Automation',
    crm_integration:'📊 CRM Integration', web_development:'🌐 Web / App Dev', ai_marketing:'📣 AI Marketing'
  };
  const summary = selectedServices.map(s => serviceLabels[s]||s).join(', ');
  addUserMessage(summary);

  sessionData.selectedServices = [...selectedServices];

  sendToWebhook({
    step: nextStep,
    selectedServices: [...selectedServices],
    selectedRole:     sessionData.selectedRole     || '',
    selectedBudget:   sessionData.selectedBudget   || '',
    selectedTimeline: sessionData.selectedTimeline || '',
    sessionId: SESSION_ID,
    ...contactInfo
  });
}

function handleSingleClick(btn, wrap) {
  wrap.querySelectorAll('.btn-option').forEach(b => { b.disabled=true; });
  const clicked = Array.from(wrap.querySelectorAll('.btn-option')).find(b=>b.textContent===btn.label);
  if (clicked) clicked.classList.add('selected');
  addUserMessage(btn.label);

  // Store the button value in sessionData keyed by the step it belongs to
  if (btn.step === 'role')     sessionData.selectedRole     = btn.value;
  if (btn.step === 'budget')   sessionData.selectedBudget   = btn.value;
  if (btn.step === 'timeline') sessionData.selectedTimeline = btn.value;

  sendToWebhook({
    step: btn.step,
    buttonValue: btn.value,
    sessionId: SESSION_ID,
    // ── always send full session state ──
    selectedServices: sessionData.selectedServices || [],
    selectedRole:     sessionData.selectedRole     || '',
    selectedBudget:   sessionData.selectedBudget   || '',
    selectedTimeline: sessionData.selectedTimeline || '',
    ...contactInfo
  });
}

// ── CONTACT FORM ─────────────────────────────────────────────────────────
function addContactForm() {
  const msgs = document.getElementById('messages');
  const form = document.createElement('div');
  form.className = 'contact-form'; form.id = 'contact-form';
  form.innerHTML = `
    <input id="cf-name"  type="text"  placeholder="Your full name *" required/>
    <input id="cf-email" type="email" placeholder="Email address *"  required/>
    <input id="cf-phone" type="tel"   placeholder="WhatsApp number (e.g. +91...)"/>
    <button onclick="submitContact()">🚀 Book My Free Strategy Call</button>
  `;
  msgs.appendChild(form); scrollToBottom();
}

function submitContact() {
  const name  = document.getElementById('cf-name').value.trim();
  const email = document.getElementById('cf-email').value.trim();
  const phone = document.getElementById('cf-phone').value.trim();
  if (!name||!email) {
    document.getElementById('cf-name').style.borderColor  = !name  ? '#ff6b6b':'';
    document.getElementById('cf-email').style.borderColor = !email ? '#ff6b6b':'';
    return;
  }
  contactInfo = { name, email, phone };
  const form = document.getElementById('contact-form');
  if (form) form.remove();
  addUserMessage(`📧 ${email}`);
  sendToWebhook({
    step: 'contact',
    sessionId: SESSION_ID,
    name, email, phone,
    selectedServices: sessionData.selectedServices || [],
    selectedRole:     sessionData.selectedRole     || '',
    selectedBudget:   sessionData.selectedBudget   || '',
    selectedTimeline: sessionData.selectedTimeline || ''
  });
}

// ── CALENDLY CTA + INLINE EMBED ──────────────────────────────────────────
function addCalendlyCTA(url, message) {
  const msgs = document.getElementById('messages');
  const cta = document.createElement('div');
  cta.className = 'calendly-cta';
  cta.id = 'calendly-cta-card';
  cta.innerHTML = `
    <p>${message||"Pick a time that works for you — it's completely free!"}</p>
    <button class="cal-open-btn" onclick="openCalendlyEmbed('${url}')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Schedule My Free Call
    </button>
  `;
  msgs.appendChild(cta);
  scrollToBottom();
  initCalendlyListener();
}

function openCalendlyEmbed(url) {
  // Mark button as active
  const btn = document.querySelector('.cal-open-btn');
  if (btn) { btn.innerHTML = '<span class="cal-spinner"></span> Loading calendar...'; btn.style.opacity='0.7'; btn.style.pointerEvents='none'; }

  // Build embed URL
  const embedUrl = url + (url.includes('?') ? '&' : '?') + 'embed_domain=' + encodeURIComponent(location.hostname || 'bitlancetechhub.com') + '&embed_type=inline&hide_landing_page_details=1&hide_gdpr_banner=1';

  // Create overlay INSIDE the widget
  const widget = document.getElementById('chat-widget');
  const existing = document.getElementById('cal-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'cal-overlay';
  overlay.innerHTML = `
    <div class="cal-overlay-header">
      <span>📅 Book Your Free Strategy Call</span>
      <button onclick="closeCalendlyEmbed()" title="Go back">← Back</button>
    </div>
    <div class="cal-loading" id="cal-loading">
      <div class="cal-loading-spinner"></div>
      <p>Loading calendar...</p>
    </div>
    <iframe
      id="calendly-iframe"
      src="${embedUrl}"
      frameborder="0"
      style="opacity:0;transition:opacity 0.3s"
      onload="this.style.opacity='1'; document.getElementById('cal-loading').style.display='none';"
    ></iframe>
  `;
  widget.appendChild(overlay);

  // Animate in
  requestAnimationFrame(() => overlay.classList.add('visible'));
}

function closeCalendlyEmbed() {
  const overlay = document.getElementById('cal-overlay');
  if (!overlay) return;
  overlay.classList.remove('visible');
  setTimeout(() => overlay.remove(), 300);
  // Restore button
  const btn = document.querySelector('.cal-open-btn');
  if (btn) {
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Schedule My Free Call`;
    btn.style.opacity='1'; btn.style.pointerEvents='all';
  }
}

// ── Calendly postMessage listener ────────────────────────────────────────
let calendlyListenerAttached = false;
function initCalendlyListener() {
  if (calendlyListenerAttached) return;
  calendlyListenerAttached = true;

  window.addEventListener('message', function(e) {
    // Calendly fires these events via postMessage
    if (!e.data || typeof e.data !== 'object') return;
    const eventName = e.data.event || e.data.type || '';

    // "calendly.event_scheduled" fires when booking is confirmed
    if (eventName === 'calendly.event_scheduled' || eventName === 'event_scheduled') {
      handleBookingConfirmed(e.data.payload || e.data);
    }
    // Also catch legacy string events
    if (typeof e.data === 'string' && e.data.includes('event_scheduled')) {
      handleBookingConfirmed({});
    }
  });
}

// ── BOOKING CONFIRMED HANDLER ─────────────────────────────────────────────
function handleBookingConfirmed(payload) {
  closeCalendlyEmbed();
  const cta = document.getElementById('calendly-cta-card');
  if (cta) cta.style.display = 'none';
  setProgress('booked');
  currentStep = 'booked';
  const name = contactInfo.name || 'there';
  setTimeout(() => {
    addBotMessage(`✅ **Meeting Booked! You're all set, ${name}!**\n\nOur team at **Bitlance TechHub** is excited to speak with you. Check your email and WhatsApp for the confirmation & meeting link.`);
  }, 200);
  setTimeout(() => {
    const msgs = document.getElementById('messages');
    const card = document.createElement('div');
    card.className = 'booking-confirmed-card';
    card.innerHTML = `
      <div class="bc-icon">🎉</div>
      <div class="bc-title">Meeting Confirmed!</div>
      <div class="bc-subtitle">Confirmation sent to<br/><strong>${contactInfo.email || 'your email'}</strong></div>
      <a href="https://www.bitlancetechhub.com" target="_blank" class="bc-btn-outline">Visit Our Website →</a>
    `;
    msgs.appendChild(card);
    launchConfetti();
    scrollToBottom();
  }, 800);
}

function launchConfetti() {
  const colors = ['#5B4FE8','#00E5A0','#fff','#a89fff','#00c87a'];
  const widget = document.getElementById('chat-widget');
  for (let i = 0; i < 32; i++) {
    const dot = document.createElement('div');
    dot.className = 'confetti-dot';
    dot.style.cssText = `left:${20+Math.random()*60}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${5+Math.random()*6}px;height:${5+Math.random()*6}px;animation-delay:${Math.random()*0.5}s;animation-duration:${0.8+Math.random()*0.6}s;`;
    widget.appendChild(dot);
    setTimeout(() => dot.remove(), 1600);
  }
}

// ── TEXT INPUT ────────────────────────────────────────────────────────────
function sendText() {
  const input = document.getElementById('footer-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addUserMessage(text);
  sendToWebhook({ step:currentStep, message:text, sessionId:SESSION_ID, ...sessionData, ...contactInfo });
}

// ── START ─────────────────────────────────────────────────────────────────
function startConversation() {
  sendToWebhook({ step:'welcome', message:'hi', sessionId:SESSION_ID });
}

// ── SEND TO WEBHOOK ───────────────────────────────────────────────────────
async function sendToWebhook(payload) {
  showTyping(); setProgress(payload.step);
  try {
    const res = await fetch(WEBHOOK_URL, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
    });
    removeTyping();
    if (!res.ok) throw new Error('HTTP '+res.status);
    handleResponse(await res.json());
  } catch(err) {
    removeTyping();
    console.error('Webhook error:', err);
    handleLocalFallback(payload);
  }
}

// ── HANDLE RESPONSE ───────────────────────────────────────────────────────
function handleResponse(data) {
  currentStep = data.nextStep || currentStep;
  // Store any session data the backend echoes back
  if (data.selectedServices) sessionData.selectedServices = data.selectedServices;
  if (data.selectedRole)     sessionData.selectedRole     = data.selectedRole;
  if (data.selectedBudget)   sessionData.selectedBudget   = data.selectedBudget;
  if (data.selectedTimeline) sessionData.selectedTimeline = data.selectedTimeline;
  setProgress(currentStep);
  if (data.response) addBotMessage(data.response);
  if (data.buttons && data.buttons.length > 0) {
    setTimeout(() => addButtons(data.buttons, data.multiSelect||false, data.confirmButtonLabel), 300);
  }
  if (data.showContactForm)  setTimeout(() => addContactForm(), 400);
  if (data.showCalendly)     setTimeout(() => addCalendlyCTA(data.calendlyUrl||CALENDLY_URL, data.calendlyMessage), 400);
}

// ── LOCAL FALLBACK ────────────────────────────────────────────────────────
function handleLocalFallback(payload) {
  const step = payload.step;
  const flows = {
    welcome: {
      response: "👋 Welcome to **Bitlance TechHub**!\n\nWe build AI Voice Bots & Business Automation solutions. Let's find how we can help — just **4 quick steps**!\n\nWhich services are you interested in? *(Select all that apply)*",
      nextStep: 'service', multiSelect: true, confirmButtonLabel: '✅ Continue with selected',
      buttons: [
        { label:'🎙️ AI Voice Bot',          value:'ai_voice_bot',        step:'service' },
        { label:'🤖 AI Chatbot / Lead Bot',  value:'ai_chatbot',          step:'service' },
        { label:'⚙️ Workflow Automation',    value:'workflow_automation', step:'service' },
        { label:'📊 CRM Integration',        value:'crm_integration',     step:'service' },
        { label:'🌐 Web / App Development',  value:'web_development',     step:'service' },
        { label:'📣 AI Marketing Automation',value:'ai_marketing',        step:'service' }
      ]
    },
    service: {
      response: `Excellent choices! 💪 We specialise in all of that.\n\nNow, what best describes your role?`,
      nextStep:'role',
      buttons:[
        { label:'👔 Business Owner / Founder',        value:'owner',          step:'role' },
        { label:'📈 Sales / Marketing Manager',        value:'sales_marketing',step:'role' },
        { label:'💻 CTO / Tech Lead',                  value:'tech_lead',      step:'role' },
        { label:'🏢 Enterprise / Corp Decision Maker', value:'enterprise',     step:'role' }
      ]
    },
    role: {
      response:"What's your approximate project budget?", nextStep:'budget',
      buttons:[
        { label:'💵 Under $500',      value:'under_500',   step:'budget' },
        { label:'💰 $500 – $2,000',   value:'500_2000',    step:'budget' },
        { label:'💎 $2,000 – $10,000',value:'2000_10000',  step:'budget' },
        { label:'🏦 $10,000+',        value:'10000_plus',  step:'budget' }
      ]
    },
    budget: {
      response:"Almost there! 🎯 When are you looking to get started?", nextStep:'timeline',
      buttons:[
        { label:'🔥 ASAP – Within 1 week', value:'asap',       step:'timeline' },
        { label:'📅 This Month',            value:'this_month', step:'timeline' },
        { label:'🗓️ Next 1–3 Months',      value:'1_3_months', step:'timeline' },
        { label:'🔮 Just Exploring',        value:'exploring',  step:'timeline' }
      ]
    },
    timeline: {
      response:"🎉 You're a great fit for **Bitlance TechHub**!\n\nShare your contact details and we'll book a strategy call for you.",
      nextStep:'contact', showContactForm:true
    },
    contact: {
      response:`Hi **${payload.name||'there'}**! 🙌 You're all set!\n\nClick below to pick a time — our team will show you a live demo and outline a custom solution.`,
      nextStep:'booked', showCalendly:true, calendlyUrl:CALENDLY_URL
    }
  };

  const flow = flows[step];
  if (!flow) return;
  currentStep = flow.nextStep;
  setProgress(currentStep);
  addBotMessage(flow.response);
  if (flow.buttons)         setTimeout(()=>addButtons(flow.buttons, flow.multiSelect||false, flow.confirmButtonLabel), 300);
  if (flow.showContactForm) setTimeout(()=>addContactForm(), 400);
  if (flow.showCalendly)    setTimeout(()=>addCalendlyCTA(flow.calendlyUrl, null), 400);
}
</script>
